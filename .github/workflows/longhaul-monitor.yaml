# Long Haul Test Monitor
#
# Polls the AKS cluster every hour to check the long-haul test status.
# Matches LONGHAUL_REPORT_INTERVAL (default 1h).
# Fails if: Job failed, ConfigMap reports FAIL, or report is stale (>2h old).
#
name: "Long Haul Monitor"

on:
  schedule:
    - cron: "0 * * * *" # Every hour (matches LONGHAUL_REPORT_INTERVAL)
  workflow_dispatch: {} # Allow manual trigger

env:
  RESOURCE_GROUP: longhaul-rg
  CLUSTER_NAME: longhaul-aks
  NAMESPACE: documentdb-test-ns
  JOB_NAME: longhaul-test

jobs:
  check-longhaul:
    runs-on: ubuntu-latest
    steps:
      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.LONGHAUL_KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Check Job exists
        id: job-check
        run: |
          STATUS=$(kubectl get job ${{ env.JOB_NAME }} -n ${{ env.NAMESPACE }} -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || echo "NotFound")
          echo "failed_status=$STATUS" >> "$GITHUB_OUTPUT"

          ACTIVE=$(kubectl get job ${{ env.JOB_NAME }} -n ${{ env.NAMESPACE }} -o jsonpath='{.status.active}' 2>/dev/null || echo "0")
          echo "active=$ACTIVE" >> "$GITHUB_OUTPUT"

      - name: Check ConfigMap report
        id: report-check
        run: |
          RESULT=$(kubectl get configmap longhaul-report -n ${{ env.NAMESPACE }} -o jsonpath='{.data.result}' 2>/dev/null || echo "UNKNOWN")
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"

          LAST_UPDATED=$(kubectl get configmap longhaul-report -n ${{ env.NAMESPACE }} -o jsonpath='{.data.last-updated}' 2>/dev/null || echo "")
          echo "last_updated=$LAST_UPDATED" >> "$GITHUB_OUTPUT"

          REPORT=$(kubectl get configmap longhaul-report -n ${{ env.NAMESPACE }} -o jsonpath='{.data.latest-report}' 2>/dev/null || echo "No report available")
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo "$REPORT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Evaluate status
        run: |
          echo "=== Long Haul Test Status ==="
          echo "Job failed condition: ${{ steps.job-check.outputs.failed_status }}"
          echo "Job active pods: ${{ steps.job-check.outputs.active }}"
          echo "Report result: ${{ steps.report-check.outputs.result }}"
          echo "Last updated: ${{ steps.report-check.outputs.last_updated }}"
          echo ""
          echo "=== Latest Report ==="
          echo "${{ steps.report-check.outputs.report }}"
          echo ""

          # Fail if Job has failed
          if [ "${{ steps.job-check.outputs.failed_status }}" = "True" ]; then
            echo "::error::Long haul test Job FAILED"
            exit 1
          fi

          # Fail if ConfigMap reports failure
          if [ "${{ steps.report-check.outputs.result }}" = "FAIL" ]; then
            echo "::error::Long haul test reported FAIL in ConfigMap"
            exit 1
          fi

          # Fail if report is stale (>2h old) — indicates the test may be hung
          LAST="${{ steps.report-check.outputs.last_updated }}"
          if [ -n "$LAST" ] && [ "$LAST" != "UNKNOWN" ]; then
            LAST_EPOCH=$(date -d "$LAST" +%s 2>/dev/null || echo "0")
            NOW_EPOCH=$(date +%s)
            AGE_SECONDS=$((NOW_EPOCH - LAST_EPOCH))
            if [ "$AGE_SECONDS" -gt 7200 ]; then
              echo "::error::Long haul report is stale (last updated ${AGE_SECONDS}s ago, threshold 7200s). Test may be hung."
              exit 1
            fi
          fi

          # Warn if no active pods and job not found
          if [ "${{ steps.job-check.outputs.failed_status }}" = "NotFound" ]; then
            echo "::notice::No long-haul Job found — test may not be running"
          fi

          echo "✅ Long haul test is healthy"
