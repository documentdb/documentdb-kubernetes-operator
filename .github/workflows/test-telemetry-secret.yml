name: Test Telemetry Secret

on:
  workflow_dispatch:

jobs:
  test-secret:
    name: Verify APPINSIGHTS_CONNECTION_STRING
    runs-on: ubuntu-latest
    steps:
      - name: Check secret is set
        run: |
          if [ -z "${{ secrets.APPINSIGHTS_CONNECTION_STRING }}" ]; then
            echo "❌ APPINSIGHTS_CONNECTION_STRING secret is NOT set"
            exit 1
          fi
          echo "✅ APPINSIGHTS_CONNECTION_STRING secret is set"

      - name: Extract instrumentation key
        run: |
          CONN_STR="${{ secrets.APPINSIGHTS_CONNECTION_STRING }}"
          IKEY=$(echo "$CONN_STR" | tr ';' '\n' | grep '^InstrumentationKey=' | cut -d'=' -f2)
          ENDPOINT=$(echo "$CONN_STR" | tr ';' '\n' | grep '^IngestionEndpoint=' | cut -d'=' -f2-)
          
          if [ -z "$IKEY" ]; then
            echo "❌ Could not extract InstrumentationKey from connection string"
            exit 1
          fi
          echo "✅ InstrumentationKey extracted (first 8 chars): ${IKEY:0:8}..."
          
          if [ -n "$ENDPOINT" ]; then
            echo "✅ IngestionEndpoint: $ENDPOINT"
          else
            echo "ℹ️ No custom IngestionEndpoint (will use default)"
          fi
          
          echo "IKEY=$IKEY" >> $GITHUB_ENV
          echo "ENDPOINT=${ENDPOINT:-https://dc.services.visualstudio.com}" >> $GITHUB_ENV

      - name: Send test event to Application Insights
        run: |
          TRACK_URL="${ENDPOINT}/v2/track"
          PAYLOAD=$(cat <<EOF
          [
            {
              "name": "AppEvents",
              "time": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)",
              "iKey": "$IKEY",
              "data": {
                "baseType": "EventData",
                "baseData": {
                  "ver": 2,
                  "name": "TelemetrySecretTest",
                  "properties": {
                    "source": "github-actions-test",
                    "workflow": "${{ github.workflow }}",
                    "run_id": "${{ github.run_id }}"
                  }
                }
              }
            }
          ]
          EOF
          )
          
          echo "Sending test event to $TRACK_URL..."
          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST "$TRACK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_CODE:")
          
          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Application Insights accepted the test event!"
            echo "Check Azure Portal → Application Insights → Logs → customEvents | where name == 'TelemetrySecretTest'"
          else
            echo "❌ Application Insights rejected the event (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Test sed injection works
        run: |
          # Simulate what the release workflow does
          mkdir -p /tmp/test-chart
          cat > /tmp/test-chart/values.yaml << 'EOF'
          telemetry:
            enabled: true
            connectionString: ""
          EOF
          
          CONN_STR="${{ secrets.APPINSIGHTS_CONNECTION_STRING }}"
          sed -i "s|connectionString: \"\"|connectionString: \"$CONN_STR\"|g" /tmp/test-chart/values.yaml
          
          # Verify it was injected
          if grep -q 'connectionString: ""' /tmp/test-chart/values.yaml; then
            echo "❌ sed injection failed - connectionString is still empty"
            exit 1
          fi
          echo "✅ sed injection works correctly"
          echo "Injected value (masked): connectionString: \"InstrumentationKey=****...\""
