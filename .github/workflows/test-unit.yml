name: Unit Test

on:
  push:
    branches: [main]
    paths:
      - 'operator/src/**/*.go'
      - 'operator/src/go.mod'
      - 'operator/src/go.sum'
      - 'operator/documentdb-helm-chart/**'
      - '.github/workflows/test-unit.yml'
      - '.github/configs/**'
  pull_request:
    branches: [main]
    paths:
      - 'operator/src/**/*.go'
      - 'operator/src/go.mod'
      - 'operator/src/go.sum'
      - 'operator/documentdb-helm-chart/**'
      - '.github/workflows/test-unit.yml'
      - '.github/configs/**'

permissions:
  contents: read

env:
  GO_VERSION: '1.25.9'

jobs:
  unit-test:
    name: Run Unit Tests
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: operator/src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: operator/src/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run unit tests
        run: |
          go test -v -race -timeout 10m \
            $(go list ./... | grep -v /test/e2e)

      - name: Test Summary
        if: always()
        run: |
          echo "## Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Unit tests completed" >> $GITHUB_STEP_SUMMARY

  helm-chart-tests:
    name: Helm Chart Unit Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install helm-unittest plugin
        run: helm plugin install --verify=false --version v1.1.0 https://github.com/helm-unittest/helm-unittest

      - name: Run Helm unit tests
        run: |
          cd operator/documentdb-helm-chart
          helm dependency update .
          helm unittest .

      - name: Test Summary
        if: always()
        run: |
          echo "## Helm Chart Test Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Helm chart unit tests completed" >> $GITHUB_STEP_SUMMARY

  helm-chart-lint:
    name: Helm Chart Lint (chart-testing)
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # chart-testing needs history to diff against the target branch.
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Run chart-testing (lint)
        # Lints the chart and validates values.yaml plus every ci/*-values.yaml
        # combination against values.schema.json.
        run: ct lint --config .github/configs/ct.yaml

      - name: Lint Summary
        if: always()
        run: |
          echo "## Helm Chart Lint Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ chart-testing lint (schema + yaml) completed" >> $GITHUB_STEP_SUMMARY
