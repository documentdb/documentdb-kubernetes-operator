# yamllint configuration used by chart-testing (ct lint).
# Intentionally lenient: the goal is to catch structural YAML mistakes, not to
# enforce a strict style on Helm templates and values files.
rules:
  braces:
    level: error
    min-spaces-inside: 0
    max-spaces-inside: 0
  brackets:
    level: error
    min-spaces-inside: 0
    max-spaces-inside: 0
  colons:
    level: error
    max-spaces-before: 0
    max-spaces-after: 1
  commas:
    level: error
    max-spaces-before: 0
    min-spaces-after: 1
    max-spaces-after: 1
  comments: disable
  comments-indentation: disable
  document-start: disable
  empty-lines:
    level: error
    max: 2
    max-start: 0
    max-end: 1
  hyphens:
    level: error
    max-spaces-after: 1
  indentation:
    level: error
    spaces: consistent
    indent-sequences: whatever
  key-duplicates: enable
  line-length: disable
  new-line-at-end-of-file: disable
  # CRLF line endings exist in some pre-existing chart files; normalizing them
  # is out of scope for the lint setup. Don't fail the lint on newline style.
  new-lines: disable
  trailing-spaces: disable
  truthy: disable
