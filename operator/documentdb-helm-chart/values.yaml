namespace: documentdb-operator
replicaCount: 1

# DocumentDB database image version (extension + gateway images).
# This controls the DOCUMENTDB_VERSION env var passed to the operator and sidecar,
# which determines the default documentdb extension and gateway image tags at runtime.
# This version is INDEPENDENT of Chart.appVersion (which controls operator/sidecar image tags).
# When empty, the operator falls back to its compiled-in defaults (see constants.go).
documentDbVersion: "0.110.0"

# Gateway image pull policy for the gateway sidecar container.
# Valid values: Always, IfNotPresent, Never. Defaults to IfNotPresent if not set.
gatewayImagePullPolicy: ""

# DocumentDB extension image pull policy for the ImageVolume.
# Valid values: Always, IfNotPresent, Never. If not set, Kubernetes default behavior is used.
# This sets ImageVolumeSource.PullPolicy on the CNPG extension configuration
# (see operator/src/internal/cnpg/cnpg_cluster.go).
documentDbImagePullPolicy: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: "documentdb-operator"
  
# WAL Replica feature flag
walReplica: false  # Set to true to deploy the WAL replica plugin

# Image pull secrets used by all operator components (operator, sidecar injector, wal-replica).
# Each entry must be a Kubernetes Secret reference: [{ name: my-registry-secret }, ...]
#
# IMPORTANT: imagePullSecrets are namespace-scoped. This chart deploys pods into TWO
# namespaces by default: the release namespace (operator) and `cnpg-system`
# (sidecar-injector and, when enabled, wal-replica). If you use a private registry
# you must create the same pull secret in BOTH namespaces (or in every namespace
# referenced by your overrides). The chart does not create the secret for you;
# create it out-of-band before `helm install`. Example:
#   kubectl create secret docker-registry my-registry-secret \
#     --docker-server=... --docker-username=... --docker-password=... \
#     -n documentdb-operator
#   kubectl create secret docker-registry my-registry-secret \
#     --docker-server=... --docker-username=... --docker-password=... \
#     -n cnpg-system
imagePullSecrets: []

image:
  documentdbk8soperator:
    repository: ghcr.io/documentdb/documentdb-kubernetes-operator/operator
    # Pinned image tags use IfNotPresent to avoid unnecessary registry pulls on pod restart.
    pullPolicy: IfNotPresent
  sidecarinjector:
    repository: ghcr.io/documentdb/documentdb-kubernetes-operator/sidecar
    pullPolicy: IfNotPresent
  walreplica:
    repository: ghcr.io/documentdb/documentdb-kubernetes-operator/wal-replica
    pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Preflight checks
# ---------------------------------------------------------------------------
# These checks run during helm install/upgrade and abort with an actionable
# error when a required cluster-level dependency is missing. Disable
# individual checks for offline templating (GitOps) or when the dependency
# is managed out-of-band.

# cert-manager is a required dependency: the chart creates cert-manager.io/v1
# Issuer and Certificate resources for the validating webhook and the CNPG
# plugin sidecars. The preflight check fails the install with an actionable
# message if cert-manager is not present in the cluster.
certManager:
  # Set to false only if you template the chart offline (e.g., GitOps render
  # pipelines) or manage cert-manager out-of-band and the API discovery is
  # unreliable. Disabling the check does NOT remove the dependency.
  preflightCheck: true

# Per-component pod-level configuration: resources, security contexts, and scheduling.
# Defaults are conservative and aim to be compatible with Pod Security Admission's
# `restricted` profile. Override any field per component as needed.
operator:
  # Requests-only by convention: scheduler reserves capacity for the
  # operator, but no memory ceiling so a single operator can manage
  # fleets of any size without OOMKill. Set limits explicitly if your
  # environment requires Burstable→Guaranteed QoS or enforces
  # LimitRange.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    # The operator image (operator/src/Dockerfile) runs as the Alpine `manager`
    # user, which is uid 100. We pin runAsUser explicitly so Kubernetes can
    # verify the user is non-root without depending on the image's USER directive.
    # If the operator Dockerfile is changed to use a different uid, update this
    # value in lockstep with the appVersion bump.
    runAsUser: 100
    runAsGroup: 101
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  priorityClassName: ""
  # io_uring (PostgreSQL 18 asynchronous I/O) opt-in support. Enabling the
  # IOUring feature gate on a DocumentDB resource makes the operator relax the
  # postgres container seccomp profile so the io_uring syscalls are allowed.
  # These operator-level settings control HOW seccomp is relaxed for every
  # DocumentDB managed by this operator. Leave empty to use the operator's
  # built-in defaults (localhost mode, profiles/documentdb-iouring.json).
  # See docs/operator-public-documentation/io-uring.md.
  ioUring:
    # seccompMode: "localhost" (hardened; profile must be installed on every
    # postgres node) or "unconfined" (removes the sandbox; simplest, least
    # secure). Empty string keeps the operator default (localhost).
    seccompMode: ""
    # seccompProfile: Localhost profile path relative to /var/lib/kubelet/seccomp.
    # Empty string keeps the operator default (profiles/documentdb-iouring.json).
    seccompProfile: ""

sidecarInjector:
  # See operator.resources comment — requests-only by convention.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    runAsUser: 10001
    runAsGroup: 10001
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  priorityClassName: ""

walReplicaPlugin:
  # See operator.resources comment — requests-only by convention.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    # Must match the USER directive in the wal-replica plugin image's
    # Dockerfile. Pinned numerically (not by name) so kubelet's
    # runAsNonRoot check can verify it without consulting /etc/passwd.
    # Aligned with sidecarInjector (both are CNPG-I plugins); update in
    # lockstep with the eventual wal-replica Dockerfile.
    runAsUser: 10001
    runAsGroup: 10001
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  priorityClassName: ""

cloudnative-pg:
  namespaceOverride: cnpg-system
  additionalEnv:
    - name: ENABLE_INSTANCE_MANAGER_INPLACE_UPDATES
      value: "true"
