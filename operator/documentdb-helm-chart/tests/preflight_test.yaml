# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
# Preflight check unit tests — run with:
#   helm unittest operator/documentdb-helm-chart
suite: preflight checks
templates:
  - 00_preflight.yaml

tests:
  # -----------------------------------------------------------------------
  # cert-manager (default: enabled)
  # -----------------------------------------------------------------------
  - it: should fail when cert-manager CRDs are absent (default)
    asserts:
      - failedTemplate:
          errorPattern: cert-manager is required but was not found

  - it: should pass when cert-manager CRDs are present
    capabilities:
      apiVersions:
        - cert-manager.io/v1/Certificate
        - cert-manager.io/v1/Issuer
    asserts:
      - hasDocuments:
          count: 0

  - it: should pass when cert-manager check is disabled
    set:
      certManager.preflightCheck: false
    asserts:
      - hasDocuments:
          count: 0

  # -----------------------------------------------------------------------
  # CNPG CRDs (default: disabled)
  # -----------------------------------------------------------------------
  - it: should not check CNPG CRDs by default
    capabilities:
      apiVersions:
        - cert-manager.io/v1/Certificate
    asserts:
      - hasDocuments:
          count: 0

  - it: should fail when CNPG check enabled and CRDs are absent
    capabilities:
      apiVersions:
        - cert-manager.io/v1/Certificate
    set:
      cnpgCrds.preflightCheck: true
    asserts:
      - failedTemplate:
          errorPattern: CloudNative-PG CRDs are required but were not found

  - it: should pass when CNPG check enabled and CRDs are present
    capabilities:
      apiVersions:
        - cert-manager.io/v1/Certificate
        - postgresql.cnpg.io/v1/Cluster
    set:
      cnpgCrds.preflightCheck: true
    asserts:
      - hasDocuments:
          count: 0

  # -----------------------------------------------------------------------
  # VolumeSnapshot CRDs (default: disabled)
  # -----------------------------------------------------------------------
  - it: should not check VolumeSnapshot CRDs by default
    capabilities:
      apiVersions:
        - cert-manager.io/v1/Certificate
    asserts:
      - hasDocuments:
          count: 0

  - it: should fail when VolumeSnapshot check enabled and CRDs are absent
    capabilities:
      apiVersions:
        - cert-manager.io/v1/Certificate
    set:
      volumeSnapshots.preflightCheck: true
    asserts:
      - failedTemplate:
          errorPattern: VolumeSnapshot CRDs are required for DocumentDB backup functionality

  - it: should pass when VolumeSnapshot check enabled and CRDs are present
    capabilities:
      apiVersions:
        - cert-manager.io/v1/Certificate
        - snapshot.storage.k8s.io/v1/VolumeSnapshot
    set:
      volumeSnapshots.preflightCheck: true
    asserts:
      - hasDocuments:
          count: 0

  # -----------------------------------------------------------------------
  # Combined scenarios
  # -----------------------------------------------------------------------
  - it: should pass when all checks enabled and all CRDs are present
    capabilities:
      apiVersions:
        - cert-manager.io/v1/Certificate
        - cert-manager.io/v1/Issuer
        - postgresql.cnpg.io/v1/Cluster
        - snapshot.storage.k8s.io/v1/VolumeSnapshot
    set:
      cnpgCrds.preflightCheck: true
      volumeSnapshots.preflightCheck: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should pass when all checks disabled regardless of CRDs
    set:
      certManager.preflightCheck: false
      cnpgCrds.preflightCheck: false
      volumeSnapshots.preflightCheck: false
    asserts:
      - hasDocuments:
          count: 0
