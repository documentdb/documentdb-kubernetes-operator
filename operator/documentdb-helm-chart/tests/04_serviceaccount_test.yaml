# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: service account
templates:
  - 04_serviceaccount.yaml
capabilities:
  apiVersions:
    - cert-manager.io/v1/Certificate

tests:
  - it: should create a ServiceAccount with default name
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: documentdb-operator
      - equal:
          path: metadata.namespace
          value: documentdb-operator

  - it: should use custom service account name when overridden
    set:
      serviceAccount.name: "my-sa"
    asserts:
      - equal:
          path: metadata.name
          value: my-sa

  - it: should use custom namespace for service account
    set:
      namespace: custom-ns
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-ns
