apiVersion: apps/v1
kind: Deployment
metadata:
  name: documentdb-operator
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "documentdb-chart.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: "Helm"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
      - name: documentdb-operator
        image: "{{ .Values.image.documentdbk8soperator.repository }}:{{ .Values.image.documentdbk8soperator.tag | default .Chart.AppVersion }}"
        imagePullPolicy: "{{ .Values.image.documentdbk8soperator.pullPolicy }}"
        args:
        - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        - containerPort: 8081
          name: health
          protocol: TCP
        # Readiness probe gates the Service endpoint so the API server cannot
        # route webhook requests until the TLS cert is loaded (CNPG pattern).
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        startupProbe:
          httpGet:
            path: /readyz
            port: health
          failureThreshold: 30
          periodSeconds: 2
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: webhook-cert
          readOnly: true
        env:
        - name: GATEWAY_PORT
          value: "10260"
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        {{- if .Values.documentDbVersion }}
        - name: DOCUMENTDB_VERSION
          value: "{{ .Values.documentDbVersion }}"
        {{- end }}
        {{- if .Values.gatewayImagePullPolicy }}
        - name: GATEWAY_IMAGE_PULL_POLICY
          value: "{{ .Values.gatewayImagePullPolicy }}"
        {{- end }}
        {{- if .Values.documentDbImagePullPolicy }}
        - name: DOCUMENTDB_IMAGE_PULL_POLICY
          value: "{{ .Values.documentDbImagePullPolicy }}"
        {{- end }}
        # Telemetry configuration
        {{- if not .Values.telemetry.enabled }}
        - name: DOCUMENTDB_TELEMETRY_ENABLED
          value: "false"
        {{- else }}
        {{- if .Values.telemetry.connectionString }}
        - name: APPLICATIONINSIGHTS_CONNECTION_STRING
          value: {{ .Values.telemetry.connectionString | quote }}
        {{- else if .Values.telemetry.instrumentationKey }}
        - name: APPINSIGHTS_INSTRUMENTATIONKEY
          value: {{ .Values.telemetry.instrumentationKey | quote }}
        {{- end }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "localhost:4317"
        {{- end }}
        {{- if .Values.telemetry.enabled }}
        {{- if .Values.telemetry.existingSecret }}
        envFrom:
        - secretRef:
            name: {{ .Values.telemetry.existingSecret }}
        {{- end }}
        {{- end }}
      # OTel Collector sidecar — receives OTLP from operator and exports to App Insights
      {{- if .Values.telemetry.enabled }}
      - name: otel-collector
        image: "{{ .Values.telemetry.collector.image | default "ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.127.0" }}"
        args: ["--config=/etc/otel/config.yaml"]
        ports:
        - containerPort: 4317
          name: otlp-grpc
          protocol: TCP
        - containerPort: 4318
          name: otlp-http
          protocol: TCP
        volumeMounts:
        - name: otel-collector-config
          mountPath: /etc/otel
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
      {{- end }}
      volumes:
      {{- if .Values.telemetry.enabled }}
      - name: otel-collector-config
        configMap:
          name: documentdb-otel-collector-config
      {{- end }}
      - name: webhook-cert
        secret:
          secretName: documentdb-webhook-tls
          defaultMode: 420
          optional: true
