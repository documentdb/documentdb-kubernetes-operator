apiVersion: v1
kind: Service
metadata:
  annotations:
    cnpg.io/pluginClientSecret: sidecarinjector-client-tls
    cnpg.io/pluginPort: "9090"
    cnpg.io/pluginServerSecret: sidecarinjector-server-tls
  labels:
    cnpg.io/pluginName: cnpg-i-sidecar-injector.documentdb.io
    {{- include "documentdb-operator.labels" (dict "root" $ "component" "sidecar-injector") | nindent 4 }}
  # Name hardcoded: CNPG-I plugin Services in cnpg-system are shared infrastructure
  # discovered by name; templating the name would require coordinated config in CNPG.
  name: sidecar-injector
  namespace: cnpg-system
spec:
  ports:
  - port: 9090
    protocol: TCP
    targetPort: 9090
  selector:
    {{- include "documentdb-operator.selectorLabels" (dict "root" $ "component" "sidecar-injector") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    {{- include "documentdb-operator.labels" (dict "root" $ "component" "sidecar-injector") | nindent 4 }}
  name: sidecar-injector
  namespace: cnpg-system
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "documentdb-operator.selectorLabels" (dict "root" $ "component" "sidecar-injector") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "documentdb-operator.selectorLabels" (dict "root" $ "component" "sidecar-injector") | nindent 8 }}
    spec:
      containers:
      - args:
        - plugin
        - --server-cert=/server/tls.crt
        - --server-key=/server/tls.key
        - --client-cert=/client/tls.crt
        - --server-address=:9090
        image: "{{ .Values.image.sidecarinjector.repository }}:{{ .Values.image.sidecarinjector.tag | default .Chart.AppVersion }}"
        imagePullPolicy: "{{ .Values.image.sidecarinjector.pullPolicy }}"
        name: cnpg-i-sidecar-injector
        env:
        {{- if .Values.documentDbVersion }}
        - name: DOCUMENTDB_VERSION
          value: "{{ .Values.documentDbVersion }}"
        {{- end }}
        ports:
        - containerPort: 9090
          protocol: TCP
        resources: {}
        volumeMounts:
        - mountPath: /server
          name: server
        - mountPath: /client
          name: client
      volumes:
      - name: server
        secret:
          secretName: sidecarinjector-server-tls
      - name: client
        secret:
          secretName: sidecarinjector-client-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sidecarinjector-client
  namespace: cnpg-system
spec:
  commonName: sidecarinjector-client
  duration: 2160h
  isCA: false
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: selfsigned-issuer
  renewBefore: 360h
  secretName: sidecarinjector-client-tls
  usages:
  - client auth
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sidecarinjector-server
  namespace: cnpg-system
spec:
  commonName: sidecar-injector
  dnsNames:
  - sidecar-injector
  duration: 2160h
  isCA: false
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: selfsigned-issuer
  renewBefore: 360h
  secretName: sidecarinjector-server-tls
  usages:
  - server auth
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
  namespace: cnpg-system
spec:
  selfSigned: {}
