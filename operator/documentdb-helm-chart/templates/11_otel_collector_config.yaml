{{- if .Values.telemetry.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: documentdb-otel-collector-config
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "documentdb-chart.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: "Helm"
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

    processors:
      batch:
        timeout: 60s
        send_batch_size: 256

    exporters:
      {{- if .Values.telemetry.connectionString }}
      azuremonitor:
        connection_string: {{ .Values.telemetry.connectionString | quote }}
      {{- else if .Values.telemetry.instrumentationKey }}
      azuremonitor:
        instrumentation_key: {{ .Values.telemetry.instrumentationKey | quote }}
      {{- end }}

    service:
      pipelines:
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [azuremonitor]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [azuremonitor]
      telemetry:
        logs:
          level: "info"
{{- end }}
