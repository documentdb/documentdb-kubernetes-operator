apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: documentdb-kubeletstats-reader
  labels:
    app.kubernetes.io/name: {{ include "documentdb-chart.name" . }}
    app.kubernetes.io/managed-by: "Helm"
    documentdb.io/component: "kubeletstats"
# Granted to per-DocumentDB-cluster ServiceAccounts via a per-cluster
# ClusterRoleBinding created by the operator when
# spec.monitoring.kubeletstats is set on a DocumentDB resource.
# Used by the OTel sidecar's kubeletstats receiver to call
# /api/v1/nodes/<name>/proxy/stats/summary on the local kubelet.
rules:
  - apiGroups: [""]
    resources: ["nodes/stats", "nodes/proxy"]
    verbs: ["get"]
