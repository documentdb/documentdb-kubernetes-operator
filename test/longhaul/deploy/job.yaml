# Long Haul Test - Kubernetes Job
#
# Usage:
#   1. Build and push the image:
#      docker build -t <registry>/longhaul-test:latest -f test/longhaul/Dockerfile test/longhaul/
#      docker push <registry>/longhaul-test:latest
#
#   2. Update the image reference below.
#
#   3. Create the credentials secret (if not using existing):
#      kubectl create secret generic longhaul-mongo-credentials \
#        --from-literal=uri='mongodb://user:pass@service:10260/?directConnection=true&authMechanism=SCRAM-SHA-256&tls=true&tlsInsecure=true' \
#        -n documentdb-test-ns
#
#   4. Apply RBAC and Job:
#      kubectl apply -f deploy/rbac.yaml
#      kubectl apply -f deploy/job.yaml
#
#   5. Monitor:
#      kubectl logs -f job/longhaul-test -n documentdb-test-ns
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: longhaul-test-config
  namespace: documentdb-test-ns
  labels:
    app.kubernetes.io/name: longhaul-test
    app.kubernetes.io/component: testing
data:
  # Test duration. Use "0s" for run-until-failure (infinite).
  LONGHAUL_MAX_DURATION: "3h"
  # Target DocumentDB cluster.
  LONGHAUL_NAMESPACE: "documentdb-test-ns"
  LONGHAUL_CLUSTER_NAME: "documentdb-cluster"
  # Writer/verifier counts.
  LONGHAUL_NUM_WRITERS: "5"
  LONGHAUL_NUM_VERIFIERS: "2"
  # Operation scheduling.
  LONGHAUL_OP_COOLDOWN: "10m"
  LONGHAUL_RECOVERY_TIMEOUT: "5m"
  # Replica range for scale operations.
  LONGHAUL_MIN_REPLICAS: "1"
  LONGHAUL_MAX_REPLICAS: "1"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: longhaul-test
  namespace: documentdb-test-ns
  labels:
    app.kubernetes.io/name: longhaul-test
    app.kubernetes.io/component: testing
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 14400  # 4 hours hard limit (safety net)
  template:
    metadata:
      labels:
        app.kubernetes.io/name: longhaul-test
        app.kubernetes.io/component: testing
    spec:
      serviceAccountName: longhaul-test
      restartPolicy: Never
      containers:
        - name: longhaul
          image: documentdblonghaul.azurecr.io/longhaul-test:latest  # Built from test/longhaul/Dockerfile
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: longhaul-test-config
          env:
            - name: LONGHAUL_MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: longhaul-mongo-credentials
                  key: uri
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
