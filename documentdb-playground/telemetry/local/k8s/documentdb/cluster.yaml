# ⚠️  DEMO/PLAYGROUND ONLY — credentials below are for local development.
# Do NOT use these passwords in production.
apiVersion: v1
kind: Namespace
metadata:
  name: documentdb-preview-ns
---
apiVersion: v1
kind: Secret
metadata:
  name: documentdb-credentials
  namespace: documentdb-preview-ns
type: Opaque
stringData:
  username: demo_user
  password: DemoPassword100
---
apiVersion: documentdb.io/preview
kind: DocumentDB
metadata:
  name: documentdb-preview
  namespace: documentdb-preview-ns
spec:
  nodeCount: 1
  instancesPerNode: 3
  documentDbCredentialSecret: documentdb-credentials
  # To use a custom gateway image (e.g. with OTel instrumentation from a local build):
  #   1. Push your image: docker tag my-gateway localhost:5001/documentdb-gateway:latest
  #      docker push localhost:5001/documentdb-gateway:latest
  #   2. Uncomment the line below:
  # gatewayImage: "localhost:5001/documentdb-gateway:latest"
  exposeViaService:
    serviceType: ClusterIP
  resource:
    storage:
      pvcSize: 5Gi
  sidecarInjectorPluginName: cnpg-i-sidecar-injector.documentdb.io
  # Enable the OTel Collector sidecar (one per pod). The sidecar:
  #   - receives OTLP metrics from the documentdb-gateway on localhost:4317
  #   - exposes Prometheus /metrics on the configured port
  # Prometheus discovers the sidecar via pod annotations injected by the operator.
  monitoring:
    enabled: true
    exporter:
      prometheus:
        port: 9187
