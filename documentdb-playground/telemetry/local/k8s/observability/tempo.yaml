# ============================================================
# Tempo - Distributed tracing backend (traces store)
# ⚠️  DEMO/PLAYGROUND ONLY — single-binary, local ephemeral
# storage (emptyDir), no auth. Not for production use.
# ============================================================
#
# Why Tempo (and not Prometheus) for traces:
#   Metrics are *scraped* by Prometheus from each per-pod OTel sidecar.
#   Traces cannot be scraped — each sidecar *pushes* spans (OTLP/gRPC) to a
#   central store. Tempo receives OTLP on :4317 and Grafana queries it on :3200.
#
# The DocumentDB CR points the sidecar traces pipeline at
#   tempo.observability.svc.cluster.local:4317
# via spec.monitoring.tracing.otlpEndpoint.
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: observability
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
      grpc_listen_port: 9096
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    ingester:
      max_block_duration: 5m
    compactor:
      compaction:
        block_retention: 1h
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/blocks
        wal:
          path: /var/tempo/wal
    # Generate service-graph and span metrics so Grafana's trace->metrics and
    # node-graph views work. Metrics are exposed for Prometheus to scrape.
    metrics_generator:
      registry:
        external_labels:
          source: tempo
      storage:
        path: /var/tempo/generator/wal
      processor:
        local_blocks:
          filter_server_spans: false
    overrides:
      metrics_generator_processors:
        - service-graphs
        - span-metrics
        - local-blocks
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: observability
  labels:
    app: tempo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
      annotations:
        # Let Prometheus scrape Tempo's generated span/service-graph metrics.
        prometheus.io/scrape: "true"
        prometheus.io/port: "3200"
        prometheus.io/path: /metrics
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tempo
          image: grafana/tempo:2.7.1
          args:
            - "-config.file=/etc/tempo/tempo.yaml"
          ports:
            - name: http
              containerPort: 3200
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: data
              mountPath: /var/tempo
      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: observability
  labels:
    app: tempo
spec:
  selector:
    app: tempo
  type: ClusterIP
  ports:
    - name: http
      port: 3200
      targetPort: 3200
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
