# DaemonSet that installs the IOUring Localhost seccomp profile onto every node:
#   /var/lib/kubelet/seccomp/profiles/documentdb-iouring.json
#
# The DocumentDB operator's localhost mode references this default profile as:
#   localhostProfile: profiles/documentdb-iouring.json
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: documentdb-iouring-seccomp-installer
  namespace: kube-system
  labels:
    app.kubernetes.io/name: documentdb-iouring-seccomp-installer
    app.kubernetes.io/part-of: io-uring-feature
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: documentdb-iouring-seccomp-installer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: documentdb-iouring-seccomp-installer
        app.kubernetes.io/part-of: io-uring-feature
    spec:
      tolerations:
        - operator: Exists
      initContainers:
        - name: install-profile
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              install -D -m 0644 /profile/documentdb-iouring.json /host-seccomp/profiles/documentdb-iouring.json
              echo "installed profiles/documentdb-iouring.json on $(hostname)"
          volumeMounts:
            - name: profile
              mountPath: /profile
              readOnly: true
            - name: host-seccomp
              mountPath: /host-seccomp
      containers:
        - name: pause
          image: busybox:1.36
          command: ["/bin/sh", "-c", "trap 'exit 0' TERM; while true; do sleep 3600 & wait $!; done"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: profile
          configMap:
            name: documentdb-iouring-seccomp-profile
        - name: host-seccomp
          hostPath:
            path: /var/lib/kubelet/seccomp
            type: DirectoryOrCreate
