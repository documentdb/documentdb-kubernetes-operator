# Strategic-merge patch for an ALREADY-INSTALLED operator (quick start, no node
# profile). For fresh installs prefer the first-class Helm value:
#   --set operator.ioUring.seccompMode=unconfined
# Unconfined disables the seccomp sandbox for postgres pods when IOUring is enabled.
# Apply with:
#   kubectl patch deployment documentdb-operator -n documentdb-operator --type strategic --patch-file operator-values/unconfined-patch.yaml
spec:
  template:
    spec:
      containers:
        - name: documentdb-operator
          env:
            - name: DOCUMENTDB_IOURING_SECCOMP_MODE
              value: unconfined
