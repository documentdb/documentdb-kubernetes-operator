# Strategic-merge patch for an ALREADY-INSTALLED operator. For fresh installs
# prefer the first-class Helm values:
#   --set operator.ioUring.seccompMode=localhost
#   --set operator.ioUring.seccompProfile=profiles/documentdb-iouring.json
# Apply with:
#   kubectl patch deployment documentdb-operator -n documentdb-operator --type strategic --patch-file operator-values/localhost-patch.yaml
spec:
  template:
    spec:
      containers:
        - name: documentdb-operator
          env:
            - name: DOCUMENTDB_IOURING_SECCOMP_MODE
              value: localhost
            - name: DOCUMENTDB_IOURING_SECCOMP_PROFILE
              value: profiles/documentdb-iouring.json
